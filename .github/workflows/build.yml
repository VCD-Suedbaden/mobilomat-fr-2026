name: Deploy to netcup with FTP
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # hugo version
      HUGO_VERSION: 0.161.1
      TZ: Europe/Berlin
      BASE_URL: https://mobilomat-freiburg.de
      SERVER_DIR: mobilomat-freiburg.de/httpdocs/
      HUGO_ENVIRONMENT: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod
      - uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      - name: Lint
        run: make lint
      - name: Cache Hugo .deb
        id: cache-hugo
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/hugo.deb
          key: hugo-${{ env.HUGO_VERSION }}
      - name: Download Hugo CLI if not cached
        if: steps.cache-hugo.outputs.cache-hit != 'true'
        run: wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
      - name: Install Hugo CLI
        run: sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Configure Git
        run: git config core.quotepath false
      - name: Build with Hugo
        run: |-
          hugo \
            --gc \
            --minify \
            --baseURL "${{ env.BASE_URL }}/"
      # https://community.netcup.com/en/tutorials/automating-deployment-with-github-actions
      - name: Copy dir public/ with FTP to server
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER_IP }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # FTP user in netcup has path / (root) for "Basisverzeichnis"
          server-dir: ${{ env.SERVER_DIR }}
          local-dir: ./public/

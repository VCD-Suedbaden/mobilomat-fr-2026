title: "Mobil-O-Mat OB-Wahl Freiburg"
locale: "de-DE"
defaultContentLanguage: de
disableKinds: ["taxonomy", "term", "rss"]
# https://github.com/bep/hugo-testing-tailwindcss-v4/tree/main
build:
  cachebusters:
    - source: layouts/.*
      target: css
markup:
  highlight:
    noClasses: false
enableRobotsTXT: false
# This is needed for candidates with accent marks in characters (ć, è, é, ...)
removePathAccents: true
params:
  welcomeTitle: "Mobil-O-Mat"
  welcomeSubtitle: "OB-Wahl Freiburg"
  welcomeSubtext: "Teste schnell und einfach, welche OB-Kandidierenden deine Positionen teilen!"
  welcomeIntro: "Beantworte {totalQuestions} Fragen zu Mobilitätsthemen und vergleiche Deine Antworten mit"
  resultTitle: "Mein Ergebnis"
  resultSubtitle: "Vergleich mit den Freiburger OB-Kandidierenden"
  resultShareTitle: "Mein Mobil-O-Mat-Ergebnis für die OB-Wahl:"
  disclaimer: "Kandidierende, die weder innerhalb der zweiwöchigen Frist noch innerhalb der zusätzlichen, zweiten mehrtägigen Frist auf unsere Anfrage geantwortet haben, wurden nicht berücksichtigt. Mobil-O-Mat ist ein kostenloses Informationstool, das vom VCD bereitgestellt wird. Die Inhalte spiegeln die Perspektive des Vereins wider und erheben keinen Anspruch auf vollständige politische Neutralität oder Vollständigkeit."
  vcdLogoURL: "https://bw.vcd.org/der-vcd-in-bw/freiburg"
  imprintURL: "https://bw.vcd.org/der-vcd-in-bw/suedbaden/impressum"
